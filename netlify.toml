[build]
  publish = "site"
  command = "echo 'Static site — no build step'"

# Netlify Forms — ensure form detection on static HTML
[build.processing]
  skip_processing = false

# Pretty URLs: /trump-accounts → trump-accounts.html
[[redirects]]
  from = "/trump-accounts"
  to = "/trump-accounts.html"
  status = 200

[[redirects]]
  from = "/parents"
  to = "/parents.html"
  status = 200

[[redirects]]
  from = "/business"
  to = "/business.html"
  status = 200

[[redirects]]
  from = "/game"
  to = "/game.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# Force HTTPS when custom domain cert is active
[[redirects]]
  from = "http://playmoneymoves.com/*"
  to = "https://playmoneymoves.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.playmoneymoves.com/*"
  to = "https://playmoneymoves.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.playmoneymoves.com/*"
  to = "https://playmoneymoves.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
